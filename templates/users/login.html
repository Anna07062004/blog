{%  extends "base.html"%}

{% block content %}

    <div class="w-6/12 border rounded-lg bg-white p-4 mx-auto border-zinc-300">
        <h1 class="font-bold text-2x1">Вход</h1>
        <p class="text-sm text-zinc-500 font-medium">Войдите, чтобы создавать постыб комментировать и сохранять в избранное</p>
        <form class="mt-4 flex flex-col gap-4">
            <div>
                <lobel for="username" class="block text-sm text-zinc-500">Имя пользователя</lobel>
                <input type="text" id="username" name="username" placeholder="Имя пользователя" class="w-full px-4 py-2 border border-zinc-300 text-base rounded-lg"/>
            </div>

            <div>
                <lobel for="password" class="block text-sm text-zinc-500">Пароль</lobel>
                <input type="password" id="password" name="password" placeholder="Пароль" class="w-full px-4 py-2 border border-zinc-300 text-base rounded-lg"/>
            </div>

            <button type="submit" class="flex items-center justify-center h-11 px-6 bg-black text-white text-base font-medium rounded-lg">Войти</button>

            <p class="mt-5 text-sm text-slate-600"> Нет аккаунта? <a href="" class="text-blue-600">Зарегестрируйтесь</a></p>
        </form>
    </div>

{% endblock %}
